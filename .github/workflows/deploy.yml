name: Deploy to rbrheating.com

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 10 rbrheating.com > ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy root files
        run: |
          rsync -avz --no-perms \
            -e "ssh -i ~/.ssh/id_ed25519" \
            index.html favicon.ico auth.php credentials.php .htaccess \
            rbrheating@rbrheating.com:/home/rbrheating/rbrheating.com/

      - name: Deploy resources
        run: |
          for dir in as css icon img json webson; do
            rsync -avz --no-perms --delete \
              -e "ssh -i ~/.ssh/id_ed25519" \
              resources/$dir/ \
              rbrheating@rbrheating.com:/home/rbrheating/rbrheating.com/resources/$dir/
          done

      - name: Bump PWA service-worker cache version
        run: |
          SHORT_SHA="${GITHUB_SHA:0:8}"
          sed -i "s/const CACHE_VERSION = '[^']*';/const CACHE_VERSION = 'sha-${SHORT_SHA}';/" new-ui/sw.js
          grep CACHE_VERSION new-ui/sw.js | head -1

      - name: Deploy new UI (PWA)
        run: |
          rsync -avz --no-perms --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            new-ui/ \
            rbrheating@rbrheating.com:/home/rbrheating/rbrheating.com/new-ui/
